<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvore DOM</title>
</head>
<body>
    <div id="conteudo">Conteudo Original</div>
    <button onclick="mudarConteudo()">Mudar conteudo</button>
    
    <script>
        function mudarConteudo() {
            var conteudo = window.document.getElementById("conteudo")
            conteudo.innerHTML = "Novo conteudo"
        }
    </script>
</body>
</html>
